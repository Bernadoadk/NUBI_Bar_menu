<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | NUBI Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/main-Bf0-zQJK.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/config-C1ASA8pk.js">
  <link rel="stylesheet" crossorigin href="/assets/main-HvNo6VQq.css">
</head>
<body class="bg-[#0a0a0a] text-gray-200 selection:bg-purple-500/30 overflow-x-hidden">

    <!-- Decorative Glows -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600/10 blur-[120px] rounded-full pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/10 blur-[120px] rounded-full pointer-events-none z-0"></div>

    <!-- Language Toggle -->
    <div class="fixed top-6 right-6 z-[100]">
        <button id="lang-toggle" class="bg-black/50 backdrop-blur-md border border-purple-500/30 px-4 py-2 rounded-full text-xs font-bold tracking-widest hover:border-purple-500 transition-all flex items-center gap-2">
            <span id="lang-text">FR</span>
            <i data-lucide="languages" class="w-4 h-4 text-purple-400"></i>
        </button>
    </div>

    <!-- Header / Hero Section -->
    <header class="relative h-[60vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black/80 z-10"></div>
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80')] bg-cover bg-center opacity-40 grayscale contrast-125"></div>
        
        <div class="z-20 text-center px-4">
            <h1 class="text-6xl md:text-9xl font-serif text-white mb-6 tracking-tight drop-shadow-2xl">
                NUBI <span class="text-purple-500 glow-text">Bar</span>
            </h1>
            <div class="h-px w-24 bg-purple-500 mx-auto mb-8"></div>
            <p id="hero-subtitle" class="text-lg md:text-2xl text-gray-300 font-light max-w-2xl mx-auto uppercase tracking-[0.2em]">
                Discover Our Selection
            </p>
            <p id="hero-categories" class="mt-6 text-[10px] text-purple-400/80 tracking-widest uppercase font-bold">Wines • Spirits • Cocktails • Food</p>
        </div>
    </header>

    <!-- Sticky Navigation -->
    <nav id="category-nav" class="sticky top-0 z-50 bg-[#0a0a0a]/95 backdrop-blur-xl border-b border-white/5 py-5 overflow-x-auto no-scrollbar">
        <div class="container mx-auto px-4">
            <ul id="nav-list" class="flex items-center justify-start md:justify-center gap-6 md:gap-10 whitespace-nowrap text-[10px] md:text-xs font-bold uppercase tracking-[0.2em] text-gray-500">
                <!-- Nav items generated via script -->
            </ul>
        </div>
    </nav>

    <!-- Menu Content -->
    <main id="menu-container">
        <!-- Sections will be injected here via script.js -->
    </main>

    <!-- Footer -->
    <footer class="py-20 bg-[#0a0a0a] border-t border-white/5 text-center relative z-20">
        <div class="mb-8">
            <h2 class="font-serif text-2xl text-white tracking-widest">NUBI BAR</h2>
            <p id="footer-tagline" class="text-gray-500 text-sm mt-2 font-light italic">Elegance in every pour.</p>
        </div>
        <p class="text-gray-600 text-[9px] uppercase tracking-[0.3em]" id="footer-disclaimer">© 2026 NUBI Bar • All prices in FCFA • Please drink responsibly</p>
    </footer>

    <!-- WhatsApp Button -->
    <a id="whatsapp-btn" href="https://wa.me/225000000000?text=Hello%20NUBI%20Bar,%20I'd%20like%20to%20reserve%20a%20table." 
       target="_blank" 
       class="fixed bottom-6 right-6 z-[60] group flex items-center justify-end"
       aria-label="Reserve via WhatsApp">
        <div class="bg-purple-600 text-white p-4 rounded-full shadow-[0_0_25px_rgba(147,51,234,0.4)] flex items-center gap-3 transition-all duration-300 hover:pr-6 group-hover:scale-110">
            <i data-lucide="message-circle" class="w-6 h-6"></i>
            <span id="whatsapp-text" class="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs transition-all duration-500 font-semibold text-sm">RESERVE TABLE</span>
        </div>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
